<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hey Kiyana</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-weight: 700;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
            white-space: normal;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            line-height: 1.4;
            letter-spacing: -0.5px;
            min-height: 120px;
            opacity: 1;
            /* فید نرم‌تر و طولانی‌تر */
            transition: opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fade-text {
            opacity: 0 !important;
        }

        .buttons-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            opacity: 0;
            transform: translateY(16px);
            visibility: hidden;
            /* ورود دکمه‌ها نرم‌تر */
            transition:
                opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                visibility 0s linear 0.7s;
            width: 100%;
        }

        #phase1-buttons {
            display: flex;
        }

        #phase2-buttons {
            display: none;
            height: 60px;
        }

        .buttons-container.show {
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
            /* override delay هنگام show */
            transition:
                opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                visibility 0s linear 0s;
        }

        .btn {
            background-color: #1c1c1e;
            color: #ffffff;
            border: 2px solid #2c2c2e;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: inherit;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition:
                transform 0.25s cubic-bezier(0.16, 1, 0.3, 1),
                background-color 0.25s ease,
                opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        .btn:not(#runawayBtn):hover {
            background-color: #2c2c2e;
            transform: scale(1.05);
        }

        .btn:not(#runawayBtn):active {
            transform: scale(0.96);
        }

        /* دکمه فراری — fixed روی کل صفحه تا آزادانه فرار کنه */
        #runawayBtn {
            position: fixed;
            z-index: 9999;
            cursor: default;
            transition:
                left 0.22s cubic-bezier(0.22, 1, 0.36, 1),
                top 0.22s cubic-bezier(0.22, 1, 0.36, 1),
                opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: auto;
        }

        /* موبایل: پریدن سریع‌تر داشته باشه */
        @media (hover: none) and (pointer: coarse) {
            #runawayBtn {
                transition:
                    left 0.18s cubic-bezier(0.22, 1, 0.36, 1),
                    top 0.18s cubic-bezier(0.22, 1, 0.36, 1),
                    opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            }
        }

        /* fade-out برای مخفی کردن دکمه‌ها */
        .fade-out {
            opacity: 0 !important;
            transform: translateY(-8px) !important;
            pointer-events: none;
            transition:
                opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                transform 0.5s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        /* کرسر چشمک‌زن */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #ffffff;
            margin-left: 3px;
            vertical-align: middle;
            animation: blink 0.9s step-end infinite;
            border-radius: 1px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        .cursor.hidden {
            opacity: 0;
            animation: none;
        }

        /* استیکر بالای متن — duration دقیقاً هماهنگ با فید متن (0.7s) */
        #sticker {
            width: 140px;
            height: 140px;
            object-fit: contain;
            margin-bottom: 10px;
            opacity: 0;
            transform: scale(0.85) translateY(8px);
            transition:
                opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1),
                transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        #sticker.show {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* ─── Mobile ─────────────────────────────────────────────────── */
        @media (max-width: 500px) {
            h1 {
                font-size: 1.8rem;
                min-height: 90px;
            }

            .btn {
                padding: 13px 28px;
                font-size: 1rem;
            }

            #sticker {
                width: 110px;
                height: 110px;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <img id="sticker" src="" alt="">
        <h1 id="text-target"><span id="text-content"></span><span class="cursor hidden" id="cursor"></span></h1>

        <div class="buttons-container" id="phase1-buttons">
            <button class="btn" onclick="handlePhase1Response('yes')">Yes</button>
            <button class="btn" onclick="handlePhase1Response('no')">No</button>
        </div>

        <div class="buttons-container" id="phase2-buttons">
            <button class="btn" id="meeludBtn" onclick="handleMeeludClick()">meelud</button>
        </div>
    </div>

    <!-- دکمه فراری خارج از container تا کل صفحه رو بپوشونه -->
    <button class="btn" id="runawayBtn" style="display:none;">prefer not to say</button>

        const TEXT = {

            yesResp:      "nothing feels like smoking with me",

        // ─── DOM refs ─────────────────────────────────────────────────────────
        const textContent   = document.getElementById('text-content');
        const cursor        = document.getElementById('cursor');
        const textTarget    = document.getElementById('text-target');
        const stickerEl     = document.getElementById('sticker');
        const phase1Buttons = document.getElementById('phase1-buttons');

        // ─── Sticker helpers ──────────────────────────────────────────────────

        // Show sticker after typing completes (two rAF to guarantee transition fires)
        function showSticker(src) {
            stickerEl.classList.remove('show');
            if (!src) { stickerEl.src = ''; return; }
            stickerEl.src = src;
            requestAnimationFrame(() => requestAnimationFrame(() => stickerEl.classList.add('show')));
        }

        // Hide sticker (called in sync with text fade-out)
        function hideSticker() {
            stickerEl.classList.remove('show');
        }

        // ─── Typewriter ───────────────────────────────────────────────────────
        // stickerSrc: if provided, shown only AFTER typing finishes (no spoilers)
        function typeWriter(text, speed, callback, stickerSrc) {
            let i = 0;
            textContent.textContent = '';
            textTarget.classList.remove('fade-text');
            cursor.classList.remove('hidden');

            (function type() {
                if (i < text.length) {
                    textContent.textContent += text.charAt(i++);
                    setTimeout(type, speed + (Math.random() - 0.5) * speed * 0.4);
                } else {
                    setTimeout(() => {
                        cursor.classList.add('hidden');
                        if (stickerSrc !== undefined) showSticker(stickerSrc);
                        if (callback) setTimeout(callback, 250);
                    }, 350);
                }
            })();
        }

        // ─── Text transition ──────────────────────────────────────────────────
        // Fades out current text (and sticker if stickerSrc is provided),
        // then types nextText, showing stickerSrc only after typing finishes.
        const FADE_DURATION = 750; // must match CSS opacity transition (0.7s + buffer)

        function transition(nextText, speed, callback, holdTime = 1200, stickerSrc) {
            setTimeout(() => {
                textTarget.classList.add('fade-text');
                cursor.classList.add('hidden');
                if (stickerSrc !== undefined) hideSticker();

                setTimeout(() => {
                    textContent.textContent = '';
                    typeWriter(nextText, speed, callback, stickerSrc);
                }, FADE_DURATION);
            }, holdTime);
        }

        // ─── Sequence helpers ─────────────────────────────────────────────────

        function goToRankQuestion(cb) {
            transition(TEXT.questionIntro, 75, () => {
                transition(TEXT.rankQ, 75, cb, 1300);
            }, 1300);
        }

        function goToNvmPath() {
            transition(TEXT.nvm, 85, () => {
                goToRankQuestion(showPhase2);
            }, 1300, STICKERS["nvm"]);
        }

        function goToDirectPath() {
            goToRankQuestion(showPhase2);
        }

        function goToEndSequence() {
            typeWriter(TEXT.whoWouldve, 80, () => {
                transition(TEXT.so, 90, () => {
                    transition(TEXT.horse, 75, null, 1300);
                }, 1600);
            });
        }

        // ─── Phase handlers ───────────────────────────────────────────────────

        window.onload = () => {
            setTimeout(() => {
                typeWriter(TEXT.welcome, 85, () => {
                    transition(TEXT.firstQ, 75, () => {
                        phase1Buttons.classList.add('show');
                    }, 2200, STICKERS["2"]);
                }, STICKERS["1"]);
            }, 700);
        };

        function handlePhase1Response(answer) {
            // Fade out buttons, text, and current sticker together
            phase1Buttons.classList.add('fade-out');
            hideSticker();
            textTarget.classList.add('fade-text');
            cursor.classList.add('hidden');

            setTimeout(() => {
                phase1Buttons.style.display = 'none';
                textContent.textContent = '';

                if (answer === 'yes') {
                    typeWriter(TEXT.dare, 80, () => {
                        transition(TEXT.yesResp, 75, goToNvmPath, 1600, STICKERS["1"]);
                    }, STICKERS["3"]);
                } else {
                    typeWriter(TEXT.noResp, 75, goToDirectPath);
                }
            }, FADE_DURATION);
        }

        function handleMeeludClick() {
            runawayBtn.style.opacity = '0';
            runawayBtn.style.pointerEvents = 'none';
            phase2Buttons.classList.add('fade-out');

            setTimeout(() => {
                phase2Buttons.style.display = 'none';
                runawayBtn.style.display = 'none';
                goToEndSequence();
            }, 550);
        }

        // ─── Phase 2 display ─────────────────────────────────────────────────

        function showPhase2() {
            phase2Buttons.style.display = 'flex';

            requestAnimationFrame(() => {
                phase2Buttons.classList.add('show');
                requestAnimationFrame(() => {
                    const r = meeludBtn.getBoundingClientRect();
                    runawayBtn.style.left = `${r.right + 20}px`;
                    runawayBtn.style.top  = `${r.top}px`;
                    runawayBtn.style.display = '';
                    startRunawayEffect();
                });
            });
        }

        // ─── Runaway button ───────────────────────────────────────────────────

        const isTouchDevice = () => window.matchMedia('(hover: none) and (pointer: coarse)').matches;

        function getRandomPosition(btnWidth, btnHeight, padding) {
            return {
                left: padding + Math.random() * (window.innerWidth  - btnWidth  - padding * 2),
                top:  padding + Math.random() * (window.innerHeight - btnHeight - padding * 2),
            };
        }

        function startRunawayEffect() {
            const PADDING       = 50;
            const SAFETY_RADIUS = 150;

            if (isTouchDevice()) {
                // موبایل: با هر tap روی دکمه، به جای تصادفی می‌پره
                runawayBtn.addEventListener('touchstart', (e) => {
                    e.preventDefault(); // جلوگیری از scroll و click اتفاقی
                    const r = runawayBtn.getBoundingClientRect();
                    const pos = getRandomPosition(r.width, r.height, PADDING);
                    runawayBtn.style.left = `${pos.left}px`;
                    runawayBtn.style.top  = `${pos.top}px`;
                }, { passive: false });
            } else {
                // دسکتاپ: فرار از موس با mousemove
                let ticking = false;
                document.addEventListener('mousemove', (e) => {
                    if (ticking) return;
                    ticking = true;
                    requestAnimationFrame(() => {
                        moveRunaway(e.clientX, e.clientY, PADDING, SAFETY_RADIUS);
                        ticking = false;
                    });
                });
            }
        }

        function moveRunaway(mx, my, padding, radius) {
            const r = runawayBtn.getBoundingClientRect();
            const cx = r.left + r.width  / 2;
            const cy = r.top  + r.height / 2;
            const dx = mx - cx;
            const dy = my - cy;
            const dist = Math.hypot(dx, dy);

            if (dist >= radius) return;

            const force = ((radius - dist) / radius) ** 2 * 2.2;
            let newLeft = r.left - dx * force;
            let newTop  = r.top  - dy * force;

            newLeft = Math.max(padding, Math.min(newLeft, window.innerWidth  - r.width  - padding));
            newTop  = Math.max(padding, Math.min(newTop,  window.innerHeight - r.height - padding));

            runawayBtn.style.left = `${newLeft}px`;
            runawayBtn.style.top  = `${newTop}px`;
        }
    </script>
